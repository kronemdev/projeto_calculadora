<!DOCTYPE html>
<html lang="pt-be">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora</title>
    
    <link rel="stylesheet" href="style.css">

   <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="calculadora">

    <h1 id="principal">calculadora</h1>
    <div class="visor">0</div>
    
    <div class="seu-container-cinza">
     <div class="botao limpar" style="grid-column: span 3; width: 100%;">C</div>
     <div class="botao operador">/</div>

        <div class="botao">7</div>
        <div class="botao">8</div>
        <div class="botao">9</div> 
        <div class="botao operador">x</div>

        <div class="botao">4</div>
        <div class="botao">5</div>
        <div class="botao">6</div>
        <div class="botao operador">-</div>

        <div class="botao">1</div>
        <div class="botao">2</div>
        <div class="botao">3</div>
        <div class="botao operador">+</div>

        <div class="botao" style="grid-column: span 2; width: 100%;">0</div>
        <div class="botao">.</div>
        <div class="botao">=</div>
    
    </div>
  </div>

</body>
</html>
